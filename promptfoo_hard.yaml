description: "Terraform Vulnerability Detection Benchmark - Hard Mode"
prompts:
  - |
    You are a cloud security expert. Review the following Terraform code and identify all security vulnerabilities.
    You MUST output ONLY a valid JSON object with exactly two fields:
    1. "vulnerabilities": A list of strings of Checkov Check IDs (e.g., ["CKV_AWS_20", "CKV_AWS_18"]) present in the file. Use the exact CKV_* format.
    2. "remediation_code": A string containing syntactically valid HCL Terraform code that fixes all the issues. Properly escape quotes and newlines so the overall output remains valid JSON.

    Terraform Code:
    {{terraform_code}}
providers:
  - id: openrouter:openai/gpt-5.4-mini
    config:
      timeout: 30000
  - id: openrouter:google/gemini-3-flash-preview
    config:
      timeout: 30000
  - id: openrouter:deepseek/deepseek-chat-v3.1
    config:
      timeout: 60000
tests: tests_hard.csv
defaultTest:
  assert:
    - type: python
      value: file://validate_output.py
